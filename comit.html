<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私の最初のホームページ</title>
    <style>
        /* ==============================
           サイバーパンク・テーマ CSS
           ============================== */

        /* 全体の設定 */
        body {
            margin: 0;
            padding: 0;
            /* 背景画像：未来都市の風景 (image_1.pngの上部) */
            background-image: url('data:image/png;base64,xxxxxxxxxx'); /* ここに生成された画像データを埋め込むか、外部URLに */
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #1a1a1a; /* 画像がない場合のダークグレー背景 */
            font-family: 'Courier New', Courier, monospace; /* ターミナル風の等幅フォント */
            color: #00f0ff; /* 基本文字色：ネオンブルー */
            text-transform: uppercase; /* 大文字で統一してテック感を出す */
            line-height: 1.6;
        }

        /* ページのコンテンツを囲むメインコンテナ */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 10vh; /* ヘッダー画像が見えるように上部を空ける */
        }

        /* 見出し（ようこそ！） */
        h1 {
            font-size: 3rem;
            color: #ff00f0; /* ネオンピンク */
            text-shadow: 
                0 0 5px #ff00f0,
                0 0 10px #ff00f0,
                0 0 20px #ff00f0,
                0 0 40px #ff00f0,
                0 0 80px #ff00f0; /* ネオングロー効果 */
            margin-bottom: 30px;
        }

        /* プロフィール情報の枠（テック系フレーム） */
        .profile-frame {
            border: 2px solid #00f0ff; /* ネオンブルーの枠 */
            background-color: rgba(26, 26, 26, 0.9); /* 半透明のダークグレー背景 */
            padding: 30px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); /* 枠外へのグロー */
        }

        /* テック系フレームの四隅の装飾 */
        .profile-frame::before,
        .profile-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00f0ff;
            border-style: solid;
        }

        .profile-frame::before {
            top: -2px;
            left: -2px;
            border-width: 2px 0 0 2px;
        }

        .profile-frame::after {
            top: -2px;
            right: -2px;
            border-width: 2px 2px 0 0;
        }

        .profile-frame .bottom::before,
        .profile-frame .bottom::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00f0ff;
            border-style: solid;
        }

        .profile-frame .bottom::before {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 2px 2px;
        }

        .profile-frame .bottom::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 2px 2px 0;
        }

        /* プロフィール項目の行 */
        .profile-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        /* ラベル（私の名前：など） */
        .profile-item-label {
            color: #ff00f0; /* ネオンピンク */
            text-shadow: 0 0 5px #ff00f0;
        }

        /* 内容（[HAYATO]など） */
        .profile-item-content {
            color: #00f0ff; /* ネオンブルー */
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* アイコン */
        .profile-icon {
            font-size: 1.5rem;
            color: #00f0ff;
            text-shadow: 0 0 5px #00f0ff;
        }

        /* 趣味のリスト */
        .hobbies-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hobbies-list li {
            position: relative;
            padding-left: 20px;
        }

        .hobbies-list li::before {
            content: '>'; /* ターミナル風の矢印 */
            position: absolute;
            left: 0;
            color: #ff00f0; /* ネオンピンク */
            font-weight: bold;
        }

        /* スキャンライン効果（画面全体のオーバーレイ） */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(
                rgba(26, 26, 26, 0.1) 1px,
                transparent 1px
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="container">
        <h1>ようこそ！</h1>

        <div class="profile-frame">
            <div class="bottom"></div> <div class="profile-item">
                <span class="profile-item-label">私の名前:</span>
                <span class="profile-item-content">
                    [HAYATO] <span class="profile-icon">🔑</span> </span>
            </div>

            <div class="profile-item">
                <span class="profile-item-label">学部学科:</span>
                <span class="profile-item-content">
                    [人間開発学部] <span class="profile-icon">🧠</span> </span>
            </div>

            <div class="profile-item" style="align-items: flex-start;">
                <span class="profile-item-label">趣味:</span>
                <div class="profile-item-content">
                    <ul class="hobbies-list">
                        <li>[電脳探索]</li>
                        <li>[ネオン書道]</li>
                        <li>[ドローンレース]</li>
                    </ul>
                    <span class="profile-icon" style="align-self: center;">🎮</span> </div>
            </div>

        </div>
    </div>
</body>
</html>
